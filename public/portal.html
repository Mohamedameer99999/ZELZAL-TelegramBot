<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ZELZAL — بوابة التحميل</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='80'>⚡</text></svg>">
<script src="api.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#0a0a15;color:#fff;min-height:100vh;direction:rtl;display:flex;align-items:center;justify-content:center;padding:20px}
.container{width:100%;max-width:600px}
.header{text-align:center;margin-bottom:30px}
.header h1{font-size:28px;background:linear-gradient(135deg,#00f5a0,#00d9f5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:#889;font-size:14px;margin-top:8px}
.card{background:#111122;border-radius:16px;padding:30px;border:1px solid #ffffff0a;margin-bottom:15px}
.card-title{font-size:16px;font-weight:700;margin-bottom:15px;color:#00f5a0}
input{width:100%;padding:12px 15px;background:#0a0a15;border:1px solid #ffffff15;border-radius:8px;color:#fff;font-size:16px;margin-bottom:12px;direction:ltr;text-align:center;letter-spacing:2px}
input:focus{outline:none;border-color:#00f5a0}
.btn{padding:12px 30px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:all .3s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:linear-gradient(135deg,#00f5a0,#00d9f5);color:#0a0a15;width:100%;justify-content:center}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px #00f5a033}
.btn-download{background:#00d9f5;color:#0a0a15}
.btn-download:hover{transform:translateY(-2px);box-shadow:0 8px 25px #00d9f533}
.error{color:#ff4444;font-size:13px;margin-bottom:10px;display:none}
.success{color:#00f5a0;font-size:13px;margin-bottom:10px;display:none}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #ffffff08;font-size:14px}
.info-row:last-child{border-bottom:none}
.info-label{color:#667}
.info-value{color:#fff;font-weight:600}
.result-card{display:none}
.status-badge{display:inline-block;padding:4px 14px;border-radius:12px;font-size:13px;font-weight:600}
.status-badge.active{background:#00f5a015;color:#00f5a0}
.status-badge.expired{background:#ff444415;color:#ff4444}
.status-badge.revoked{background:#ff444415;color:#ff4444}
.loading{text-align:center;padding:20px;color:#667;display:none}
.spinner{width:20px;height:20px;border:3px solid #ffffff0a;border-top-color:#00f5a0;border-radius:50%;animation:spin .8s linear infinite;display:inline-block;vertical-align:middle;margin-left:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.download-links{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.download-links .btn{flex:1;min-width:120px;justify-content:center}
.back-link{display:block;text-align:center;margin-top:20px;color:#667;font-size:13px;text-decoration:none}
.back-link:hover{color:#00f5a0}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>⚡ بوابة تحميل ZELZAL</h1>
<p>أدخل مفتاح الترخيص للتحقق من اشتراكك وتحميل المنتج</p>
</div>

<div class="card" id="inputCard">
<div class="card-title">🔑 مفتاح الترخيص</div>
<input type="text" id="licenseInput" placeholder="XXXXX-XXXXX-XXXXX-XXXXX-XXXXXXXX" onkeydown="if(event.key==='Enter')verify()" oninput="this.value=this.value.toUpperCase()">
<div class="error" id="errorMsg">❌ مفتاح الترخيص غير صالح</div>
<div class="loading" id="loadingState"><div class="spinner"></div> جاري التحقق...</div>
<button class="btn btn-primary" onclick="verify()" id="verifyBtn">تحقق من المفتاح</button>
</div>

<div class="card result-card" id="resultCard">
<div class="card-title">✅ معلومات الترخيص</div>
<div id="licenseInfo"></div>
<div id="downloadSection" style="display:none">
<div class="download-links" id="downloadLinks"></div>
</div>
</div>

<a href="/" class="back-link">← العودة إلى الموقع الرئيسي</a>
</div>

<script>
async function verify() {
  const key = document.getElementById('licenseInput').value.trim();
  if (!key || key.length < 10) { showError('الرجاء إدخال مفتاح صحيح'); return; }
  hideError();
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('verifyBtn').disabled = true;
  try {
    const data = await API.verifyLicense(key);
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('verifyBtn').disabled = false;
    if (!data.valid) { showError(data.reason || 'مفتاح الترخيص غير صالح'); return; }
    showResult(data);
  } catch (e) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('verifyBtn').disabled = false;
    showError('فشل الاتصال بالخادم. حاول مرة أخرى.');
  }
}

function showResult(data) {
  document.getElementById('inputCard').style.display = 'none';
  const rc = document.getElementById('resultCard');
  rc.style.display = 'block';
  const info = document.getElementById('licenseInfo');
  const statusClass = data.status === 'active' ? 'active' : (data.status === 'expired' ? 'expired' : 'revoked');
  const statusText = data.status === 'active' ? 'نشط' : (data.status === 'expired' ? 'منتهي' : 'ملغي');
  info.innerHTML = '';
  const rows = [
    { label: 'المنتج', value: data.product },
    { label: 'النوع', value: data.plan_type === 'monthly' ? 'شهري' : data.plan_type === 'yearly' ? 'سنوي' : data.plan_type },
    { label: 'الحالة', value: '<span class="status-badge ' + statusClass + '">' + statusText + '</span>' },
    { label: 'تاريخ البدء', value: data.created_at ? new Date(data.created_at).toLocaleDateString('ar-EG') : '—' },
    { label: 'تاريخ الانتهاء', value: data.expires_at ? new Date(data.expires_at).toLocaleDateString('ar-EG') : '—' },
  ];
  if (data.customer_name) rows.push({ label: 'العميل', value: data.customer_name });
  if (data.phone) rows.push({ label: 'الهاتف', value: data.phone });
  rows.forEach(r => {
    const row = document.createElement('div');
    row.className = 'info-row';
    row.innerHTML = '<span class="info-label">' + r.label + '</span><span class="info-value">' + r.value + '</span>';
    info.appendChild(row);
  });

  const ds = document.getElementById('downloadSection');
  if (data.status === 'active') {
    ds.style.display = 'block';
    const links = document.getElementById('downloadLinks');
    links.innerHTML = '';
    const dl = document.createElement('a');
    dl.href = '/';
    dl.className = 'btn btn-download';
    dl.textContent = '📥 تحميل ' + (data.product_name || 'المنتج');
    dl.target = '_blank';
    links.appendChild(dl);
    const wa = document.createElement('a');
    wa.href = 'https://wa.me/201034085168?text=' + encodeURIComponent('طلب مساعدة في تحميل المنتج - المفتاح: ' + document.getElementById('licenseInput').value.trim());
    wa.className = 'btn btn-primary';
    wa.textContent = '💬 مساعدة في التحميل';
    wa.target = '_blank';
    links.appendChild(wa);
  } else {
    ds.style.display = 'none';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = '❌ ' + msg;
  el.style.display = 'block';
}
function hideError() { document.getElementById('errorMsg').style.display = 'none'; }
</script>
</body>
</html>
